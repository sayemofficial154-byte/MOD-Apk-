<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Play Store</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #ff0000; /* লাল থিম */
            --bg: #ffffff;
            --text-dark: #202124;
            --text-grey: #5f6368;
            --transition: all 0.3s ease;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: #fff; color: var(--text-dark); padding-bottom: 80px; }

        /* 🔥 Header */
        header { 
            padding: 20px 15px; background: #fff; position: sticky; top: 0; z-index: 1000; 
            border-bottom: 1px solid #f0f0f0;
        }
        .logo { font-size: 22px; font-weight: 800; color: #202124; margin-bottom: 15px; text-transform: uppercase; }
        .logo span { color: var(--primary); }

        .search-box { 
            background: #f1f3f4; padding: 12px 15px; border-radius: 12px; 
            display: flex; align-items: center;
        }
        .search-box input { background: transparent; border: none; width: 100%; outline: none; margin-left: 10px; font-size: 15px; }

        /* ✨ Navigation Logic */
        .page { display: none; padding: 15px; animation: fadeIn 0.4s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .section-title { font-size: 18px; font-weight: 700; margin: 10px 0 20px; color: #202124; }

        /* 📱 App Cards */
        .app-list { display: grid; gap: 20px; }
        .app-item { display: flex; align-items: center; text-decoration: none; cursor: pointer; }
        .app-item img { width: 65px; height: 65px; border-radius: 15px; object-fit: cover; box-shadow: 0 4px 8px rgba(0,0,0,0.05); }
        .app-info { margin-left: 15px; flex: 1; border-bottom: 1px solid #f8f8f8; padding-bottom: 12px; }
        .app-info h4 { font-size: 16px; font-weight: 600; color: #202124; }
        .app-info p { font-size: 13px; color: var(--text-grey); margin-top: 2px; }

        /* 📍 Modern Details Page (Red Theme) */
        .play-details { padding: 10px; }
        .back-btn { font-size: 22px; color: #202124; margin-bottom: 25px; cursor: pointer; display: inline-block; }
        
        .main-info { display: flex; gap: 20px; align-items: center; margin-bottom: 30px; }
        .main-info img { width: 100px; height: 100px; border-radius: 22px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); }
        .title-area h2 { font-size: 24px; font-weight: 700; color: #202124; }
        .title-area p { color: var(--primary); font-weight: 600; font-size: 14px; margin-top: 3px; }

        .play-stats { 
            display: flex; gap: 30px; padding: 20px 0;
            border-top: 1px solid #eee; border-bottom: 1px solid #eee; margin-bottom: 25px;
            justify-content: center;
        }
        .stat-box { text-align: center; }
        .stat-box strong { display: block; font-size: 16px; color: #202124; }
        .stat-box span { font-size: 12px; color: var(--text-grey); }

        .desc-area h3 { font-size: 18px; margin-bottom: 12px; font-weight: 700; }
        .desc-area p { font-size: 14px; color: #5f6368; line-height: 1.6; }

        .download-btn { 
            background: var(--primary); color: #fff; text-align: center; 
            padding: 15px; border-radius: 12px; font-weight: 700;
            display: block; text-decoration: none; margin-top: 35px;
            font-size: 16px; box-shadow: 0 5px 15px rgba(255, 0, 0, 0.3);
            transition: 0.3s;
        }
        .download-btn:active { transform: scale(0.97); }

        /* 📍 Bottom Nav */
        .bottom-nav { 
            position: fixed; bottom: 0; width: 100%; background: #fff; 
            display: flex; justify-content: space-around; 
            padding: 12px 0; border-top: 1px solid #eee; z-index: 2000;
        }
        .nav-btn { background: none; border: none; color: #999; display: flex; flex-direction: column; align-items: center; font-size: 12px; flex: 1; }
        .nav-btn i { font-size: 22px; margin-bottom: 4px; }
        .nav-btn.active { color: var(--primary); }
    </style>
</head>
<body>

<header id="main-header">
    <div class="logo">Premium <span>Play Store</span></div>
    <div class="search-box">
        <i class="fas fa-search"></i>
        <input type="text" placeholder="Search apps and games...">
    </div>
</header>

<div id="home" class="page active">
    <h3 class="section-title">Editor's Choice</h3>
    <div class="app-list">
        <div class="app-item" onclick="openDetails('CapCut Pro', '229MB', '24.0.0', 'https://i.postimg.cc/pdpkm1Q7/capcut-logo-on-transparent-white-background-free-vector.jpg', 'Professional video editing with all premium assets unlocked. Create stunning videos for TikTok and Reels without any watermark.', 'https://github.com/sayemofficial154-byte/MOD-Apk-/releases/download/v1.1/CapCut_24.0.0.apk')">
            <img src="https://i.postimg.cc/pdpkm1Q7/capcut-logo-on-transparent-white-background-free-vector.jpg">
            <div class="app-info"><h4>CapCut Pro</h4><p>Video Editor • 229 MB</p></div>
        </div>
        <div class="app-item" onclick="openDetails('GTA Kishoreganj', '1.2GB', 'v1.0', 'https://img.icons8.com/color/144/gta-5.png', 'Explore the open world of Kishoreganj in this action-packed simulation game.', '#')">
            <img src="https://img.icons8.com/color/144/gta-5.png">
            <div class="app-info"><h4>GTA Kishoreganj</h4><p>Action • 1.2 GB</p></div>
        </div>
    </div>
</div>

<div id="games" class="page">
    <h3 class="section-title">New Games</h3>
    <div class="app-list">
        <div class="app-item" onclick="openDetails('GTA Kishoreganj', '1.2GB', 'v1.0', 'https://img.icons8.com/color/144/gta-5.png', 'Explore the open world of Kishoreganj in this action-packed simulation game.', '#')">
            <img src="https://img.icons8.com/color/144/gta-5.png">
            <div class="app-info"><h4>GTA Kishoreganj</h4><p>Action • 1.2 GB</p></div>
        </div>
    </div>
</div>

<div id="apps" class="page">
    <h3 class="section-title">Useful Apps</h3>
    <div class="app-list">
        <div class="app-item" onclick="openDetails('CapCut Pro', '229MB', '24.0.0', 'https://i.postimg.cc/pdpkm1Q7/capcut-logo-on-transparent-white-background-free-vector.jpg', 'Professional video editing with all premium assets unlocked. Create stunning videos for TikTok and Reels without any watermark.', 'https://github.com/sayemofficial154-byte/MOD-Apk-/releases/download/v1.1/CapCut_24.0.0.apk')">
            <img src="https://i.postimg.cc/pdpkm1Q7/capcut-logo-on-transparent-white-background-free-vector.jpg">
            <div class="app-info"><h4>CapCut Pro</h4><p>Video Editor • 229 MB</p></div>
        </div>
    </div>
</div>

<div id="details-page" class="page">
    <div class="play-details">
        <i class="fas fa-arrow-left back-btn" onclick="switchTab('home', document.getElementById('home-btn'))"></i>
        
        <div class="main-info">
            <img id="app-icon" src="">
            <div class="title-area">
                <h2 id="app-name"></h2>
                <p>Premium Mod</p>
                <span style="font-size:12px; color:#5f6368;">Unlocked • No Ads</span>
            </div>
        </div>

        <div class="play-stats">
            <div class="stat-box"><strong>4.9 ★</strong><span>Rating</span></div>
            <div class="stat-box"><strong id="app-size-stat"></strong><span>File Size</span></div>
            <div class="stat-box"><strong>v24.0</strong><span>Version</span></div>
        </div>

        <div class="desc-area">
            <h3>Description</h3>
            <p id="app-description"></p>
        </div>

        <a href="" id="download-link" class="download-btn">Download Now</a>
    </div>
</div>

<nav class="bottom-nav">
    <button id="home-btn" class="nav-btn active" onclick="switchTab('home', this)"><i class="fas fa-th-large"></i><span>Home</span></button>
    <button class="nav-btn" onclick="switchTab('games', this)"><i class="fas fa-gamepad"></i><span>Games</span></button>
    <button class="nav-btn" onclick="switchTab('apps', this)"><i class="fas fa-shapes"></i><span>Apps</span></button>
</nav>

<script>
    function switchTab(id, btn) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        if(btn) btn.classList.add('active');
        
        // Header visibility logic
        document.getElementById('main-header').style.display = (id === 'details-page') ? 'none' : 'block';
        
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function openDetails(name, size, ver, icon, desc, link) {
        document.getElementById('app-name').innerText = name;
        document.getElementById('app-icon').src = icon;
        document.getElementById('app-size-stat').innerText = size;
        document.getElementById('app-description').innerText = desc;
        document.getElementById('download-link').href = link;
        
        switchTab('details-page');
    }
</script>

</body>
                                                                                                                </html>
