<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PREMIUM PLAY STORE - Botanical Edition</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800&family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* 🔥 ছবির মতো ব্যাকগ্রাউন্ড এবং থিম কালার */
        :root {
            --primary-red: #ff0000;
            --white: #ffffff;
            --botanical-green: #2d5a27;
            --text-dark: #333333;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background-color: var(--white);
            color: var(--text-dark);
            font-family: 'Poppins', sans-serif;
            overflow-x: hidden;
            padding-bottom: 90px;
            min-height: 100vh;
            /* ছবির মতো পুরো ব্যাকগ্রাউন্ডে লতাপাতার নকশা */
            background-image: url('https://i.ibb.co/Lz0yV3f/floral-design.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            position: relative;
        }

        /* নামের পেছনের স্টাইলিশ কার্ড */
        .header-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            padding: 25px;
            border-radius: 25px;
            margin: 20px auto;
            max-width: 90%;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            position: relative;
        }

        /* নামের সাথে পেঁচিয়ে থাকা লতাপাতার ভেক্টর আইকন */
        .floral-vine {
            position: absolute;
            width: 150px;
            top: -30px;
            left: 50%;
            transform: translateX(-50%);
            opacity: 0.7;
            pointer-events: none;
        }

        header { 
            text-align: center;
            position: sticky; top: 0; z-index: 1000;
        }

        /* 🌸 ছবির মতো বড় এবং পেঁচানো সবুজ লতাপাতায় সাজানো নাম */
        .header-title {
            font-family: 'Montserrat', sans-serif;
            font-size: 24px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 25px;
            color: var(--botanical-green);
            background: url('https://i.ibb.co/CWRv84v/botanical-header.png') no-repeat center;
            background-size: contain;
            padding: 40px 0;
            display: inline-block;
            text-shadow: 2px 2px 10px rgba(255,255,255,0.5);
        }

        /* সার্চ বক্সের ডিজাইন */
        .search-box { 
            background: rgba(255,255,255,0.9);
            padding: 12px 20px;
            border-radius: 30px; 
            display: flex; align-items: center; border: 2px solid transparent;
            max-width: 500px; margin: 0 auto;
            border: 2px solid #ddd;
            transition: 0.4s;
        }
        .search-box:focus-within { border-color: var(--primary-red); background: #fff; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .search-box input { background: transparent; border: none; width: 100%; outline: none; margin-left: 10px; font-size: 15px; color: #000; font-weight: 600; }
        .search-box input::placeholder { color: #888; }

        /* ✨ Page Animation */
        .page { display: none; padding: 25px 20px; position: relative; z-index: 2; }
        .page.active { display: block; animation: zoomIn 0.5s ease-out; }
        @keyframes zoomIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }

        .section-title { font-size: 20px; font-weight: 700; margin-bottom: 25px; border-left: 5px solid var(--botanical-green); padding-left: 15px; color: var(--botanical-green); }

        /* 📱 Premium App Item (ছবির মতো গোল এবং রেড শ্যাডোসহ) */
        .app-item { 
            background: var(--white); 
            padding: 18px; 
            border-radius: 25px; 
            display: flex; 
            align-items: center; 
            margin-bottom: 20px;
            box-shadow: 0 10px 25px rgba(255, 0, 0, 0.2); 
            transition: 0.4s;
            border: 1px solid #f0f0f0;
            cursor: pointer;
        }
        .app-item:active { transform: scale(0.96); }
        .app-item img { width: 75px; height: 75px; border-radius: 20px; object-fit: cover; border: 3px solid var(--primary-red); }
        
        .app-content { margin-left: 18px; flex: 1; }
        .app-content h4 { font-size: 18px; font-weight: 700; margin-bottom: 5px; color: #000; }
        .app-content p { font-size: 13px; color: #555; }
        
        .dl-icon { 
            width: 45px; height: 45px; background: #fff5f5; color: var(--primary-red);
            border-radius: 50%; display: flex; align-items: center; 
            justify-content: center; font-size: 20px; transition: 0.3s;
            box-shadow: 0 5px 10px rgba(255,0,0,0.1);
        }
        .app-item:hover .dl-icon { background: var(--primary-red); color: #fff; }

        /* 📍 Modern Navigation (Glass Design) */
        .bottom-nav { 
            position: fixed; bottom: 0; width: 100%; background: rgba(255,255,255,0.9); 
            backdrop-filter: blur(15px); display: flex; justify-content: space-around; 
            padding: 15px 0; border-top: 1px solid #eee; z-index: 2000;
        }
        .nav-btn { background: none; border: none; color: #bbb; display: flex; flex-direction: column; align-items: center; font-size: 12px; flex: 1; cursor: pointer; }
        .nav-btn i { font-size: 24px; margin-bottom: 5px; }
        .nav-btn.active { color: var(--primary-red); font-weight: 700; }
    </style>
</head>
<body>

<header id="main-header">
    <div class="header-card">
        <img class="floral-vine" src="https://i.ibb.co/CWRv84v/botanical-header.png" alt="Vine">
        <div class="header-title">PREMIUM PLAY STORE</div>
        <div class="search-box">
            <i class="fas fa-search" style="color: #555;"></i>
            <input type="text" id="searchInput" placeholder="Search premium modded apps..." onkeyup="searchApps()">
        </div>
    </div>
</header>

<div id="home" class="page active">
    <h3 class="section-title">Editor's Choice</h3>
    <div class="app-list" id="homeList">
        <div class="app-item" onclick="alert('Starting download for CapCut Pro...')">
            <img src="https://i.postimg.cc/pdpkm1Q7/capcut-logo-on-transparent-white-background-free-vector.jpg">
            <div class="app-content"><h4>CapCut Pro</h4><p>Premium Mod • 229 MB • unlocked</p></div>
            <div class="dl-icon"><i class="fas fa-download"></i></div>
        </div>
    </div>
</div>

<div id="games" class="page">
    <h3 class="section-title">New Games</h3>
    <center style="margin-top:50px; color:#aaa;">No Games Added Yet</center>
</div>

<div id="apps" class="page">
    <h3 class="section-title">Featured Apps</h3>
    <div class="app-list">
        <div class="app-item" onclick="alert('Starting download for CapCut Pro...')">
            <img src="https://i.postimg.cc/pdpkm1Q7/capcut-logo-on-transparent-white-background-free-vector.jpg">
            <div class="app-content"><h4>CapCut Pro</h4><p>Premium Mod • 229 MB</p></div>
            <div class="dl-icon"><i class="fas fa-download"></i></div>
        </div>
    </div>
</div>

<nav class="bottom-nav">
    <button id="home-btn" class="nav-btn active" onclick="switchTab('home', this)"><i class="fas fa-home"></i><span>Home</span></button>
    <button class="nav-btn" onclick="switchTab('games', this)"><i class="fas fa-gamepad"></i><span>Games</span></button>
    <button class="nav-btn" onclick="switchTab('apps', this)"><i class="fas fa-th-large"></i><span>Apps</span></button>
</nav>

<script>
    function switchTab(id, btn) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        if(btn) btn.classList.add('active');
        document.getElementById('main-header').style.display = (id === 'details-page') ? 'none' : 'block';
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function searchApps() {
        let input = document.getElementById('searchInput').value.toLowerCase();
        let apps = document.getElementsByClassName('app-item');
        for (let i = 0; i < apps.length; i++) {
            apps[i].style.display = apps[i].innerText.toLowerCase().includes(input) ? "flex" : "none";
        }
    }
</script>

</body>
</html>
