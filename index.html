<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PREMIUM PLAY STORE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bright-red: #ff0000;
            --deep-green: #1a4d1a;
            --white: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Arial', sans-serif; }

        body { 
            background-color: var(--bright-red);
            color: var(--white);
            overflow-x: hidden;
            padding-bottom: 80px;
        }

        /* 🌸 লতাপাতা দিয়ে ঘেরা নাম এবং ডিজাইন */
        .botanical-header {
            background: rgba(255, 255, 255, 0.9);
            margin: 20px;
            padding: 30px 15px;
            border-radius: 25px;
            text-align: center;
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            border: 4px solid var(--deep-green);
        }

        .header-title {
            color: var(--deep-green);
            font-size: 28px;
            font-weight: 900;
            text-transform: uppercase;
            position: relative;
            display: inline-block;
        }

        /* নামের সাথে পেঁচিয়ে থাকা সবুজ লতার ইফেক্ট (CSS দিয়ে তৈরি) */
        .header-title::before, .header-title::after {
            content: "🌿";
            position: absolute;
            font-size: 30px;
        }
        .header-title::before { left: -40px; top: -5px; }
        .header-title::after { right: -40px; top: -5px; transform: scaleX(-1); }

        .search-box {
            display: flex;
            background: var(--white);
            border-radius: 50px;
            padding: 10px 20px;
            max-width: 90%;
            margin: 20px auto 0;
            border: 2px solid var(--deep-green);
        }

        .search-box input {
            border: none; outline: none; flex: 1; font-size: 16px; color: #333;
        }

        /* 📱 অ্যাপ কার্ড ডিজাইন (রেড শ্যাডোসহ) */
        .app-list { padding: 20px; }
        .app-item { 
            background: var(--white); 
            border-radius: 25px; 
            padding: 15px;
            display: flex;
            align-items: center;
            margin-bottom: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            color: #000;
        }

        .app-item img { 
            width: 70px; height: 70px; border-radius: 18px; 
            border: 2px solid var(--bright-red);
        }

        .app-content { margin-left: 15px; flex: 1; }
        .app-content h4 { color: var(--deep-green); font-size: 18px; }

        .dl-btn {
            background: var(--bright-red);
            color: white;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        /* 📍 নেভিগেশন বার */
        .bottom-nav { 
            position: fixed; bottom: 0; width: 100%; background: #fff; 
            display: flex; justify-content: space-around; 
            padding: 12px 0; border-top: 3px solid var(--deep-green);
        }
        .nav-btn { background: none; border: none; color: #888; text-align: center; flex: 1; }
        .nav-btn.active { color: var(--bright-red); font-weight: bold; }
        .nav-btn i { font-size: 24px; display: block; }
    </style>
</head>
<body>

<div class="botanical-header">
    <div class="header-title">PREMIUM PLAY STORE</div>
    <div class="search-box">
        <i class="fas fa-search" style="color:#888; margin-right:10px;"></i>
        <input type="text" placeholder="Search premium apps...">
    </div>
</div>

<div class="app-list">
    <h3 style="margin-bottom: 15px; padding-left: 5px;">Top Recommended</h3>
    <div class="app-item">
        <img src="https://i.postimg.cc/pdpkm1Q7/capcut-logo-on-transparent-white-background-free-vector.jpg">
        <div class="app-content">
            <h4>CapCut Pro</h4>
            <p style="font-size: 12px; color: #666;">Premium Mod • 229 MB</p>
        </div>
        <div class="dl-btn"><i class="fas fa-download"></i></div>
    </div>
</div>

<nav class="bottom-nav">
    <button class="nav-btn active"><i class="fas fa-home"></i>Home</button>
    <button class="nav-btn"><i class="fas fa-gamepad"></i>Games</button>
    <button class="nav-btn"><i class="fas fa-th-large"></i>Apps</button>
</nav>

</body>
</html>
