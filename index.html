<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium APK Store</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #ff0000;
            --text-main: #202124;
            --text-sub: #5f6368;
            --bg-light: #ffffff;
            --border: #e8eaed;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Roboto', sans-serif; }
        body { background: var(--bg-light); color: var(--text-main); padding-bottom: 70px; }

        /* Header Style */
        header { padding: 15px; position: sticky; top: 0; background: #fff; z-index: 1000; border-bottom: 1px solid var(--border); }
        .logo { font-size: 22px; font-weight: 800; text-align: center; margin-bottom: 15px; letter-spacing: -0.5px; }
        .logo span { color: var(--primary); }

        .search-box { 
            background: #f1f3f4; padding: 10px 15px; border-radius: 8px; 
            display: flex; align-items: center;
        }
        .search-box input { background: transparent; border: none; width: 100%; outline: none; margin-left: 10px; font-size: 15px; }

        /* Page Content Logic */
        .page { display: none; padding: 15px; animation: fadeIn 0.3s; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .section-title { font-size: 16px; font-weight: 500; margin: 10px 0 15px; color: var(--text-main); }

        /* 🔥 Play Store Style Compact List */
        .app-list { display: flex; flex-direction: column; gap: 12px; }
        .app-item { 
            display: flex; align-items: center; padding: 5px 0;
            cursor: pointer; transition: 0.2s;
        }
        .app-item:active { opacity: 0.6; }
        .app-item img { width: 50px; height: 50px; border-radius: 10px; object-fit: cover; border: 1px solid #f0f0f0; }
        .app-details { margin-left: 15px; flex-grow: 1; border-bottom: 1px solid #f8f8f8; padding-bottom: 8px; }
        .app-details h4 { font-size: 15px; font-weight: 400; color: #3c4043; }
        .app-details p { font-size: 12px; color: var(--text-sub); margin-top: 2px; }

        /* Bottom Nav - 4 Items Now */
        .bottom-nav { 
            position: fixed; bottom: 0; width: 100%; background: #fff; 
            display: flex; justify-content: space-around; padding: 10px 0;
            border-top: 1px solid var(--border); box-shadow: 0 -1px 5px rgba(0,0,0,0.02);
        }
        .nav-btn { background: none; border: none; color: var(--text-sub); display: flex; flex-direction: column; align-items: center; font-size: 10px; flex: 1; }
        .nav-btn i { font-size: 20px; margin-bottom: 4px; }
        .nav-btn.active { color: var(--primary); }

        /* Status Label */
        .dl-status { font-size: 14px; text-align: center; color: var(--text-sub); margin-top: 50px; }
    </style>
</head>
<body>

<header>
    <div class="logo">Premium <span>APK</span></div>
    <div class="search-box">
        <i class="fas fa-search" style="color: #5f6368;"></i>
        <input type="text" placeholder="অ্যাপ ও গেম খুঁজুন...">
    </div>
</header>

<div id="home" class="page active">
    <h2 class="section-title">সব অ্যাপস ও গেমস</h2>
    <div class="app-list">
        <div class="app-item" onclick="window.location.href='download.html?name=CapCut&size=120MB'">
            <img src="https://img.icons8.com/color/144/capcut.png">
            <div class="app-details">
                <h4>CapCut - Video Editor</h4>
                <p>ভিডিও এডিট • ১২০ এমবি • ৪.৮ ★</p>
            </div>
        </div>
        <div class="app-item" onclick="window.location.href='download.html?name=GTA+Kishoreganj&size=1.2GB'">
            <img src="https://img.icons8.com/color/144/gta-5.png">
            <div class="app-details">
                <h4>GTA Kishoreganj</h4>
                <p>অ্যাকশন • ১.২ জিবি • ৫.০ ★</p>
            </div>
        </div>
    </div>
</div>

<div id="games" class="page">
    <h2 class="section-title">শুধুমাত্র গেমস</h2>
    <div class="app-list">
        <div class="app-item">
            <img src="https://img.icons8.com/color/144/gta-5.png">
            <div class="app-details">
                <h4>GTA Kishoreganj</h4>
                <p>অ্যাকশন • ১.২ জিবি</p>
            </div>
        </div>
    </div>
</div>

<div id="apps" class="page">
    <h2 class="section-title">শুধুমাত্র অ্যাপস</h2>
    <div class="app-list">
        <div class="app-item">
            <img src="https://img.icons8.com/color/144/capcut.png">
            <div class="app-details">
                <h4>CapCut Premium</h4>
                <p>এডিটর • ১২০ এমবি</p>
            </div>
        </div>
    </div>
</div>

<div id="storage" class="page">
    <h2 class="section-title">ডাউনলোড ফাইলসমূহ</h2>
    <div class="dl-status">
        <i class="fas fa-folder-open" style="font-size: 40px; margin-bottom: 10px; opacity: 0.3;"></i>
        <p>এখানে আপনার ডাউনলোড করা ফাইলগুলো জমা হবে।</p>
    </div>
</div>

<nav class="bottom-nav">
    <button class="nav-btn active" onclick="changeTab('home', this)"><i class="fas fa-home"></i><span>হোম</span></button>
    <button class="nav-btn" onclick="changeTab('games', this)"><i class="fas fa-gamepad"></i><span>গেমস</span></button>
    <button class="nav-btn" onclick="changeTab('apps', this)"><i class="fas fa-th-large"></i><span>অ্যাপস</span></button>
    <button class="nav-btn" onclick="changeTab('storage', this)"><i class="fas fa-circle-plus" style="font-size: 24px;"></i><span>ডাউনলোড</span></button>
</nav>

<script>
    function changeTab(id, btn) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        window.scrollTo(0,0);
    }
</script>

</body>
</html>
