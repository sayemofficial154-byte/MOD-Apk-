<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PREMIUM APK STORE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #ff0000;
            --bg: #ffffff;
            --text-dark: #202124;
            --text-grey: #5f6368;
            --card-shadow: 0 4px 12px rgba(0,0,0,0.08);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: #fafafa; color: var(--text-dark); padding-bottom: 85px; overflow-x: hidden; }

        /* 🔥 Header */
        header { 
            padding: 25px 15px; background: #fff; position: sticky; top: 0; z-index: 1000; 
            border-bottom: 1px solid #f0f0f0; box-shadow: 0 2px 15px rgba(0,0,0,0.03);
        }
        .logo { 
            font-size: 26px; font-weight: 900; text-align: center; margin-bottom: 20px; 
            letter-spacing: 1.5px; text-transform: uppercase;
        }
        .logo span { 
            color: var(--primary); 
            background: rgba(255, 0, 0, 0.05);
            padding: 2px 10px; border-radius: 8px; border: 2px solid var(--primary);
        }

        .search-container { padding: 0 10px; }
        .search-box { 
            background: #f1f3f4; padding: 12px 20px; border-radius: 15px; 
            display: flex; align-items: center; border: 1px solid transparent;
        }
        .search-box input { background: transparent; border: none; width: 100%; outline: none; margin-left: 10px; }

        /* ✨ Smooth Page Transitions */
        .page { display: none; padding: 20px 15px; animation: pageSlide 0.4s ease; }
        .page.active { display: block; }
        @keyframes pageSlide {
            from { opacity: 0; transform: translateX(50px); }
            to { opacity: 1; transform: translateX(0); }
        }

        /* 📱 App Cards (Home) */
        .app-list { display: grid; gap: 18px; }
        .app-item { 
            background: #fff; padding: 12px; border-radius: 20px; 
            display: flex; align-items: center; text-decoration: none;
            box-shadow: var(--card-shadow); transition: var(--transition);
        }
        .app-item img { width: 58px; height: 58px; border-radius: 14px; object-fit: cover; }
        .app-details { margin-left: 15px; flex-grow: 1; display: flex; justify-content: space-between; align-items: center; }
        .app-info h4 { font-size: 15px; font-weight: 600; color: #1a1a1a; }
        .app-info p { font-size: 12px; color: var(--text-grey); }
        .dl-arrow { width: 32px; height: 32px; background: #fff5f5; color: var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; }

        /* 📍 Play Store Style Details Page */
        .play-header { display: flex; align-items: flex-start; gap: 20px; margin-bottom: 25px; margin-top: 10px; }
        .play-header img { width: 90px; height: 90px; border-radius: 20px; box-shadow: 0 8px 15px rgba(0,0,0,0.1); }
        .play-title-box h2 { font-size: 22px; font-weight: 700; color: #202124; }
        .play-title-box p { color: #01875f; font-weight: 600; font-size: 14px; margin-top: 2px; }
        
        .play-stats { display: flex; justify-content: space-around; border-top: 1px solid #eee; border-bottom: 1px solid #eee; padding: 15px 0; margin-bottom: 25px; }
        .stat-item { text-align: center; border-right: 1px solid #eee; flex: 1; }
        .stat-item:last-child { border-right: none; }
        .stat-val { font-weight: 700; font-size: 15px; display: block; }
        .stat-label { font-size: 11px; color: var(--text-grey); }

        .play-desc-box h3 { font-size: 18px; margin-bottom: 10px; color: #202124; }
        .play-desc-box p { font-size: 14px; color: #5f6368; line-height: 1.6; }

        .play-download-btn { 
            position: fixed; bottom: 100px; left: 15px; right: 15px;
            background: #01875f; color: #fff; text-align: center; padding: 14px;
            border-radius: 8px; text-decoration: none; font-weight: 600; font-size: 16px;
            box-shadow: 0 4px 10px rgba(1, 135, 95, 0.3); z-index: 999;
        }

        /* 📍 Bottom Navigation */
        .bottom-nav { 
            position: fixed; bottom: 0; width: 100%; background: #fff; 
            display: flex; justify-content: space-around; 
            padding: 12px 0; border-top: 1px solid #eee; z-index: 1000;
        }
        .nav-btn { background: none; border: none; color: #999; display: flex; flex-direction: column; align-items: center; font-size: 11px; }
        .nav-btn i { font-size: 22px; margin-bottom: 5px; }
        .nav-btn.active { color: #01875f; }
    </style>
</head>
<body>

<header id="main-header">
    <div class="logo">PREMIUM <span>APK</span></div>
    <div class="search-container">
        <div class="search-box">
            <i class="fas fa-search"></i>
            <input type="text" placeholder="Search apps and games...">
        </div>
    </div>
</header>

<div id="home" class="page active">
    <h3 style="font-size: 19px; margin-bottom: 20px;">Recommended</h3>
    <div class="app-list">
        <div class="app-item" onclick="openDetails('CapCut Pro', '229MB', '24.0.0', 'https://i.postimg.cc/pdpkm1Q7/capcut-logo-on-transparent-white-background-free-vector.jpg', 'Professional video editing with all premium assets unlocked. High quality export and no watermark. Best for TikTok and Reels creators.', 'https://github.com/sayemofficial154-byte/MOD-Apk-/releases/download/v1.1/CapCut_24.0.0.apk')">
            <img src="https://i.postimg.cc/pdpkm1Q7/capcut-logo-on-transparent-white-background-free-vector.jpg">
            <div class="app-details">
                <div class="app-info">
                    <h4>CapCut Pro</h4>
                    <p>Editor • 229 MB • 4.9 ★</p>
                </div>
                <div class="dl-arrow"><i class="fas fa-arrow-down"></i></div>
            </div>
        </div>
    </div>
</div>

<div id="details-page" class="page">
    <div style="margin-bottom: 20px;">
        <i class="fas fa-arrow-left" style="font-size: 20px; cursor: pointer;" onclick="switchTab('home', document.querySelector('.nav-btn'))"></i>
    </div>

    <div class="play-header">
        <img id="app-icon" src="">
        <div class="play-title-box">
            <h2 id="app-name"></h2>
            <p id="app-dev">Premium Modder</p>
            <p style="color:#5f6368; font-weight: 400;">Contains ads • In-app purchases</p>
        </div>
    </div>

    <div class="play-stats">
        <div class="stat-item">
            <span class="stat-val">4.9 ★</span>
            <span class="stat-label">1M reviews</span>
        </div>
        <div class="stat-item">
            <span class="stat-val" id="app-size-stat"></span>
            <span class="stat-label">Download size</span>
        </div>
        <div class="stat-item">
            <span class="stat-val">Everyone</span>
            <span class="stat-label">Rated for 3+</span>
        </div>
    </div>

    <div class="play-desc-box">
        <h3>About this app</h3>
        <p id="app-description"></p>
        <div style="margin-top: 20px; color: #01875f; font-weight: 600;">Video Players & Editors</div>
    </div>

    <a href="" id="download-link" class="play-download-btn">Install</a>
</div>

<div id="games" class="page"><h3>Best Games</h3></div>
<div id="apps" class="page"><h3>New Apps</h3></div>
<div id="downloads" class="page"><h3>Downloads</h3></div>

<nav class="bottom-nav">
    <button class="nav-btn active" onclick="switchTab('home', this)"><i class="fas fa-house"></i><span>Home</span></button>
    <button class="nav-btn" onclick="switchTab('games', this)"><i class="fas fa-gamepad"></i><span>Games</span></button>
    <button class="nav-btn" onclick="switchTab('apps', this)"><i class="fas fa-border-all"></i><span>Apps</span></button>
    <button class="nav-btn" onclick="switchTab('downloads', this)"><i class="fas fa-arrow-circle-down"></i><span>Downloads</span></button>
</nav>

<script>
    function switchTab(id, btn) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        if(btn) btn.classList.add('active');
        
        // Hide Header on Details Page
        document.getElementById('main-header').style.display = (id === 'details-page') ? 'none' : 'block';
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function openDetails(name, size, ver, icon, desc, link) {
        document.getElementById('app-name').innerText = name;
        document.getElementById('app-icon').src = icon;
        document.getElementById('app-size-stat').innerText = size;
        document.getElementById('app-description').innerText = desc;
        document.getElementById('download-link').href = link;
        
        switchTab('details-page');
    }
</script>

</body>
</html>
