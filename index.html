<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PREMIUM PLAY STORE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #e60000;
            --dark-bg: #000000;
            --card-bg: #1a1a1a;
            --text-white: #ffffff;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: var(--dark-bg); color: var(--text-white); padding-bottom: 90px; }

        /* 🔥 Premium Centered Header */
        header { 
            padding: 30px 15px; 
            background: linear-gradient(to bottom, #2b0000, #000000);
            text-align: center;
            border-bottom: 2px solid var(--primary);
        }
        .header-title {
            font-size: 26px;
            font-weight: 900;
            color: var(--text-white);
            text-transform: uppercase;
            letter-spacing: 3px;
            text-shadow: 2px 2px 10px rgba(230, 0, 0, 0.6);
            margin-bottom: 20px;
        }

        /* 🔎 Search Box with Tap Logic */
        .search-container {
            display: flex;
            background: #222;
            border-radius: 50px;
            padding: 5px 5px 5px 20px;
            max-width: 90%;
            margin: 0 auto;
            border: 1px solid #444;
        }
        .search-container input {
            background: transparent; border: none; color: white; flex: 1; outline: none; font-size: 14px;
        }
        .search-btn {
            background: var(--primary);
            color: white;
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            cursor: pointer;
        }

        /* ✨ Smooth Transitions */
        .page { display: none; padding: 20px; animation: fadeIn 0.5s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* 📱 Premium App Card with Shadow */
        .app-item { 
            background: var(--card-bg); 
            padding: 15px; 
            border-radius: 20px; 
            display: flex; 
            align-items: center; 
            margin-bottom: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5), 0 0 5px rgba(230, 0, 0, 0.2); 
            transition: var(--transition);
            border: 1px solid #333;
        }
        .app-item:active { transform: scale(0.96); }
        .app-item img { width: 70px; height: 70px; border-radius: 18px; object-fit: cover; }
        .app-content { margin-left: 15px; flex: 1; }
        .app-content h4 { font-size: 17px; margin-bottom: 5px; color: white; }
        .app-content p { font-size: 12px; color: #aaa; }
        .dl-icon { color: var(--primary); font-size: 20px; }

        /* 📍 Detailed View (Beautiful Features) */
        .details-box { text-align: center; }
        .details-box img { width: 110px; height: 110px; border-radius: 25px; border: 3px solid var(--primary); margin-bottom: 20px; }
        
        .feature-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin: 25px 0;
            text-align: left;
        }
        .feature-card {
            background: #220000;
            padding: 12px;
            border-radius: 12px;
            font-size: 12px;
            border: 1px solid #440000;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .feature-card i { color: #00ff00; }

        .download-btn-big {
            background: white;
            color: black;
            text-align: center;
            padding: 18px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 800;
            display: block;
            margin-top: 30px;
            text-transform: uppercase;
            box-shadow: 0 5px 15px rgba(255,255,255,0.2);
        }

        /* 📍 Navigation Bar */
        .bottom-nav { 
            position: fixed; bottom: 0; width: 100%; background: #000; 
            display: flex; justify-content: space-around; 
            padding: 15px 0; border-top: 1px solid #333; z-index: 1000;
        }
        .nav-btn { background: none; border: none; color: #666; display: flex; flex-direction: column; align-items: center; font-size: 11px; flex: 1; }
        .nav-btn i { font-size: 22px; margin-bottom: 5px; }
        .nav-btn.active { color: var(--primary); }
    </style>
</head>
<body>

<header id="main-header">
    <div class="header-title">PREMIUM PLAY STORE</div>
    <div class="search-container">
        <input type="text" id="searchInput" placeholder="Search apps here...">
        <button class="search-btn" onclick="executeSearch()"><i class="fas fa-search"></i></button>
    </div>
</header>

<div id="home" class="page active">
    <h3 style="margin-bottom: 20px;">Top Featured</h3>
    <div class="app-list" id="mainAppList">
        <div class="app-item" onclick="openDetails('CapCut Pro', '229MB', 'https://i.postimg.cc/pdpkm1Q7/capcut-logo-on-transparent-white-background-free-vector.jpg', 'CapCut Pro is a powerful video editing app with unlocked premium features.', 'https://github.com/sayemofficial154-byte/MOD-Apk-/releases/download/v1.1/CapCut_24.0.0.apk')">
            <img src="https://i.postimg.cc/pdpkm1Q7/capcut-logo-on-transparent-white-background-free-vector.jpg">
            <div class="app-content">
                <h4>CapCut Pro</h4>
                <p>Premium Mod • 229 MB</p>
            </div>
            <i class="fas fa-download dl-icon"></i>
        </div>
    </div>
</div>

<div id="apps" class="page">
    <h3 style="margin-bottom: 20px;">Available Apps</h3>
    <div class="app-list">
        <div class="app-item" onclick="openDetails('CapCut Pro', '229MB', 'https://i.postimg.cc/pdpkm1Q7/capcut-logo-on-transparent-white-background-free-vector.jpg', 'CapCut Pro is a powerful video editing app with unlocked premium features.', 'https://github.com/sayemofficial154-byte/MOD-Apk-/releases/download/v1.1/CapCut_24.0.0.apk')">
            <img src="https://i.postimg.cc/pdpkm1Q7/capcut-logo-on-transparent-white-background-free-vector.jpg">
            <div class="app-content">
                <h4>CapCut Pro</h4>
                <p>Premium Mod • 229 MB</p>
            </div>
            <i class="fas fa-download dl-icon"></i>
        </div>
    </div>
</div>

<div id="games" class="page">
    <center style="margin-top: 100px; color: #555;">No Games Found!</center>
</div>

<div id="details-page" class="page">
    <i class="fas fa-arrow-left" style="font-size: 24px; cursor: pointer; margin-bottom: 20px;" onclick="switchTab('home', document.getElementById('home-btn'))"></i>
    <div class="details-box">
        <img id="app-icon" src="">
        <h2 id="app-name"></h2>
        <p style="color: var(--primary); font-weight: bold; margin-top: 5px;">MOD UNLOCKED</p>

        <div class="feature-grid">
            <div class="feature-card"><i class="fas fa-check-circle"></i> Network Error Fix</div>
            <div class="feature-card"><i class="fas fa-check-circle"></i> All devices Work</div>
            <div class="feature-card"><i class="fas fa-check-circle"></i> Premium Unlocked</div>
            <div class="feature-card"><i class="fas fa-check-circle"></i> Effects & Filters</div>
            <div class="feature-card"><i class="fas fa-check-circle"></i> Export Problem Fix</div>
            <div class="feature-card"><i class="fas fa-check-circle"></i> No Ads</div>
        </div>

        <div style="text-align: left; background: #111; padding: 15px; border-radius: 15px;">
            <p id="app-description" style="font-size: 14px; line-height: 1.6; color: #ccc;"></p>
        </div>

        <a href="" id="download-link" class="download-btn-big">Download Now</a>
    </div>
</div>

<nav class="bottom-nav">
    <button id="home-btn" class="nav-btn active" onclick="switchTab('home', this)"><i class="fas fa-home"></i><span>Home</span></button>
    <button class="nav-btn" onclick="switchTab('apps', this)"><i class="fas fa-th-large"></i><span>Apps</span></button>
    <button class="nav-btn" onclick="switchTab('games', this)"><i class="fas fa-gamepad"></i><span>Games</span></button>
</nav>

<script>
    function switchTab(id, btn) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        if(btn) btn.classList.add('active');
        document.getElementById('main-header').style.display = (id === 'details-page') ? 'none' : 'block';
        window.scrollTo(0, 0);
    }

    function openDetails(name, size, icon, desc, link) {
        document.getElementById('app-name').innerText = name;
        document.getElementById('app-icon').src = icon;
        document.getElementById('app-description').innerText = desc;
        document.getElementById('download-link').href = link;
        switchTab('details-page');
    }

    function executeSearch() {
        let query = document.getElementById('searchInput').value.toLowerCase();
        let apps = document.getElementsByClassName('app-item');
        let found = false;
        for (let i = 0; i < apps.length; i++) {
            if (apps[i].innerText.toLowerCase().includes(query)) {
                apps[i].style.display = "flex";
                found = true;
            } else {
                apps[i].style.display = "none";
            }
        }
        if(!found) alert("No app found with this name!");
    }
</script>

</body>
    </html>
