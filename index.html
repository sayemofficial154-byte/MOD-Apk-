<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PREMIUM PLAY STORE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-red: #ff0000;
            --dark-red: #cc0000;
            --white: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

        body { 
            background: var(--bg-red); 
            color: var(--white); 
            min-height: 100vh;
            overflow-x: hidden;
            padding-bottom: 80px;
            position: relative;
        }

        /* 🌸 SVG লতা-পাতা ডিজাইন (ছবির মতো কোণায় থাকবে) */
        .floral {
            position: fixed;
            width: 250px;
            height: 250px;
            z-index: -1;
            opacity: 0.5;
            pointer-events: none;
        }
        .top-left { top: 0; left: 0; }
        .bottom-right { bottom: 80px; right: 0; transform: rotate(180deg); }

        header { 
            padding: 30px 15px; 
            text-align: center; 
            background: linear-gradient(to bottom, var(--dark-red), var(--bg-red));
        }

        .header-title {
            font-size: 26px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 25px;
        }

        /* 🔎 সার্চ বক্স (Tap to Search Logic) */
        .search-container {
            display: flex;
            background: var(--white);
            border-radius: 50px;
            padding: 6px 6px 6px 20px;
            max-width: 90%;
            margin: 0 auto;
        }

        .search-container input {
            background: transparent; border: none; color: #000; flex: 1; outline: none; font-size: 16px;
        }

        .search-btn {
            background: #000; color: #fff; border: none;
            width: 42px; height: 42px; border-radius: 50%; cursor: pointer;
        }

        /* 📱 অ্যাপ কার্ড ডিজাইন (শ্যাডোসহ) */
        .page { padding: 20px; display: none; }
        .page.active { display: block; animation: fadeIn 0.4s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }

        .app-item { 
            background: rgba(255, 255, 255, 0.1); 
            backdrop-filter: blur(10px);
            padding: 18px; 
            border-radius: 25px; 
            display: flex; 
            align-items: center; 
            margin-bottom: 18px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
            cursor: pointer;
        }

        .app-item img { width: 70px; height: 70px; border-radius: 18px; border: 2px solid white; }
        .app-content { margin-left: 15px; flex: 1; }
        .app-content h4 { font-size: 18px; font-weight: 700; }
        .app-content p { font-size: 12px; opacity: 0.9; }

        /* 📍 ডাউনলোড ডিটেইলস পেজ */
        .feature-list { text-align: left; margin: 25px 0; }
        .feature-card {
            background: rgba(255, 255, 255, 0.1);
            padding: 12px; border-radius: 15px; margin-bottom: 10px;
            display: flex; align-items: center; gap: 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .download-btn {
            background: var(--white); color: var(--bg-red);
            text-align: center; padding: 18px; border-radius: 50px;
            text-decoration: none; font-weight: 900; display: block;
            margin-top: 25px; text-transform: uppercase;
        }

        /* 📍 নিচের মেনু বার */
        .bottom-nav { 
            position: fixed; bottom: 0; width: 100%; background: var(--dark-red); 
            display: flex; justify-content: space-around; 
            padding: 15px 0; border-top: 1px solid rgba(255,255,255,0.1); z-index: 1000;
        }
        .nav-btn { background: none; border: none; color: rgba(255,255,255,0.5); display: flex; flex-direction: column; align-items: center; font-size: 12px; flex: 1; }
        .nav-btn i { font-size: 24px; margin-bottom: 5px; }
        .nav-btn.active { color: var(--white); font-weight: bold; }
    </style>
</head>
<body>

<svg class="floral top-left" viewBox="0 0 200 200" fill="white">
    <path d="M0,0 Q50,0 50,50 T100,100 M0,50 Q25,50 25,75 T50,100 M50,0 Q50,25 75,25 T100,50" stroke="white" stroke-width="2" fill="none" opacity="0.3"/>
    <circle cx="20" cy="20" r="5" opacity="0.4"/><circle cx="60" cy="40" r="3" opacity="0.4"/>
</svg>
<svg class="floral bottom-right" viewBox="0 0 200 200" fill="white">
    <path d="M0,0 Q50,0 50,50 T100,100 M0,50 Q25,50 25,75 T50,100 M50,0 Q50,25 75,25 T100,50" stroke="white" stroke-width="2" fill="none" opacity="0.3"/>
</svg>

<header id="main-header">
    <div class="header-title">PREMIUM PLAY STORE</div>
    <div class="search-container">
        <input type="text" id="searchInput" placeholder="Search premium apps...">
        <button class="search-btn" onclick="executeSearch()"><i class="fas fa-search"></i></button>
    </div>
</header>

<div id="home" class="page active">
    <h3 style="margin-bottom: 20px;">Top Recommended</h3>
    <div class="app-list">
        <div class="app-item" onclick="openDetails('CapCut Pro', '229MB', 'https://i.postimg.cc/pdpkm1Q7/capcut-logo-on-transparent-white-background-free-vector.jpg', 'CapCut Pro is the best video editor with all premium features unlocked.', 'https://github.com/sayemofficial154-byte/MOD-Apk-/releases/download/v1.1/CapCut_24.0.0.apk')">
            <img src="https://i.postimg.cc/pdpkm1Q7/capcut-logo-on-transparent-white-background-free-vector.jpg">
            <div class="app-content"><h4>CapCut Pro</h4><p>Premium Mod • 229 MB</p></div>
            <i class="fas fa-download"></i>
        </div>
    </div>
</div>

<div id="apps" class="page">
    <h3 style="margin-bottom: 20px;">Apps Section</h3>
    <div class="app-list">
        <div class="app-item" onclick="openDetails('CapCut Pro', '229MB', 'https://i.postimg.cc/pdpkm1Q7/capcut-logo-on-transparent-white-background-free-vector.jpg', 'CapCut Pro is the best video editor with all premium features unlocked.', 'https://github.com/sayemofficial154-byte/MOD-Apk-/releases/download/v1.1/CapCut_24.0.0.apk')">
            <img src="https://i.postimg.cc/pdpkm1Q7/capcut-logo-on-transparent-white-background-free-vector.jpg">
            <div class="app-content"><h4>CapCut Pro</h4><p>Premium Mod • 229 MB</p></div>
            <i class="fas fa-download"></i>
        </div>
    </div>
</div>

<div id="games" class="page"><center style="margin-top:50px;">Coming Soon...</center></div>

<div id="details-page" class="page">
    <i class="fas fa-arrow-left" style="font-size: 24px; cursor: pointer; margin-bottom: 20px;" onclick="switchTab('home', document.getElementById('home-btn'))"></i>
    <div style="text-align: center;">
        <img id="app-icon" src="" style="width: 100px; height: 100px; border-radius: 20px; border: 3px solid white;">
        <h2 id="app-name" style="margin-top: 15px;"></h2>
        <div class="feature-list">
            <div class="feature-card"><i class="fas fa-check-circle"></i> Network Error Fix.</div>
            <div class="feature-card"><i class="fas fa-check-circle"></i> All devices Working.</div>
            <div class="feature-card"><i class="fas fa-check-circle"></i> Prem!um Features Unl0cked.</div>
            <div class="feature-card"><i class="fas fa-check-circle"></i> Effects Filter & tamplet Working.</div>
            <div class="feature-card"><i class="fas fa-check-circle"></i> Video Export Problem Fixed.</div>
            <div class="feature-card"><i class="fas fa-check-circle"></i> Ads Rem0ve.</div>
        </div>
        <a href="" id="download-link" class="download-btn">Download Now</a>
    </div>
</div>

<nav class="bottom-nav">
    <button id="home-btn" class="nav-btn active" onclick="switchTab('home', this)"><i class="fas fa-home"></i><span>Home</span></button>
    <button class="nav-btn" onclick="switchTab('apps', this)"><i class="fas fa-th-large"></i><span>Apps</span></button>
    <button class="nav-btn" onclick="switchTab('games', this)"><i class="fas fa-gamepad"></i><span>Games</span></button>
</nav>

<script>
    function switchTab(id, btn) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        if(btn) btn.classList.add('active');
        document.getElementById('main-header').style.display = (id === 'details-page') ? 'none' : 'block';
        window.scrollTo(0,0);
    }

    function openDetails(name, size, icon, desc, link) {
        document.getElementById('app-name').innerText = name;
        document.getElementById('app-icon').src = icon;
        document.getElementById('download-link').href = link;
        switchTab('details-page');
    }

    function executeSearch() {
        let q = document.getElementById('searchInput').value.toLowerCase();
        document.querySelectorAll('.app-item').forEach(item => {
            item.style.display = item.innerText.toLowerCase().includes(q) ? 'flex' : 'none';
        });
    }
</script>
</body>
</html>
